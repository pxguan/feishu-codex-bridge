# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt
      name:
        type: string
        description: Run name

permissions:
  contents: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run agent
        uses: pxguan/pullfrog@c0b187d4c0d5840d25e37c18506367fb0b43d3f9
        with:
          prompt: ${{ inputs.prompt }}
        env:
          # add at least one provider API key
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY:
            ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          # fork 改造：gatewayProvider() 读这两个 env 注入自定义 mygateway provider
          PULLFROG_GATEWAY_URL: ${{ secrets.OCR_LLM_URL }}
          PULLFROG_GATEWAY_API_KEY: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          # 让 opencode 经 mygateway 走内网网关（resolveModel 原样透传带斜杠非别名）
          PULLFROG_MODEL: mygateway/glm-5.2
          
          # for Amazon Bedrock (https://docs.pullfrog.com/bedrock)
          # AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # AWS_REGION: us-east-1
          # BEDROCK_MODEL_ID: <bedrock-model-id>
          
          # for Google Vertex AI (https://docs.pullfrog.com/vertex)
          # VERTEX_SERVICE_ACCOUNT_JSON: >-
          #   ${{ secrets.VERTEX_SERVICE_ACCOUNT_JSON }}
          # GOOGLE_CLOUD_PROJECT: my-project
          # VERTEX_LOCATION: global
          # VERTEX_MODEL_ID: <vertex-model-id>
