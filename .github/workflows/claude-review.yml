name: Claude Review

# 三 reviewer 之三：anthropics/claude-code-action（Anthropic 官方开源）
# PR 打开/更新时自动用 Claude 评审；PR 评论 @claude 也可触发
# ⚠️ claude-code-action 无 path_filters 硬过滤，「仅 Go」靠 direct_prompt 软引导（模型可能瞥非 Go 文件）
#    inputs/触发语义以 https://github.com/anthropics/claude-code-action 的 README 为准；配好跑时若报错我帮你调

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    # PR 事件自动评；issue_comment 仅在 PR 评论含 @claude 时触发
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          # 接内网 GLM 网关：claude-code-action 经此 base url 走网关，而非公网 Anthropic
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          direct_prompt: |
            用中文评审这个 PR 的 **Go 代码**改动（仅 *.go，忽略 TS / 测试 / 生成代码）。聚焦：
            - error 必须处理，不得用 _ 吞错（尤其 chmod、文件 IO、网络 / 飞书 SDK 调用）
            - goroutine 泄漏与并发安全（共享状态、锁、channel）
            - context 取消 / 超时必须向下传递，不得用 context.Background() 截断
            - defer 释放资源；临时文件 / 目录权限收紧
            给出具体行号的建议，按严重度标注。
